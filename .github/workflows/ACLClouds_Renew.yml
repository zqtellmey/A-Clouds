name: ACLClouds 自动续期

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 UTC 02:00 运行（北京时间 10:00）
  workflow_dispatch:       # 支持手动触发

jobs:
  renew:
    name: 执行续期检测
    runs-on: ubuntu-latest
    permissions:
      actions: write   # 允许删除 workflow runs
      contents: read
    timeout-minutes: 15

    steps:
      - name: 拉取仓库
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: 启用 WARP 网络
        uses: fscarmen/warp-on-actions@v1.3
        with:
          stack: dual
          mode: client

      - name: 修复 DNS
        run: |
          echo "[INFO] 停用 systemd-resolved，设置公共 DNS..."
          sudo systemctl stop systemd-resolved 2>/dev/null || true
          sudo systemctl disable systemd-resolved 2>/dev/null || true

          sudo rm -f /etc/resolv.conf
          echo -e "nameserver 1.1.1.1\nnameserver 8.8.8.8\nnameserver 1.0.0.1" | sudo tee /etc/resolv.conf

          sleep 2

          echo "[INFO] DNS 测试:"
          nslookup dash.aclclouds.com 1.1.1.1 || echo "[WARN] 解析失败"

          echo ""
          echo "[INFO] 当前出口 IP:"
          curl -s --max-time 10 https://api.ipify.org && echo
          echo "[INFO] WARP Trace:"
          curl -s --max-time 10 https://www.cloudflare.com/cdn-cgi/trace | grep -E 'ip=|warp=|loc=' || true

      - name: 运行续期脚本
        env:
          ACLCLOUDS_EMAIL:    ${{ secrets.ACLCLOUDS_EMAIL }}
          ACLCLOUDS_PASSWORD: ${{ secrets.ACLCLOUDS_PASSWORD }}
          TG_BOT_TOKEN:       ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:         ${{ secrets.TG_CHAT_ID }}
          WXPUSHER_APPTOKEN:  ${{ secrets.WXPUSHER_APPTOKEN }}
          WXPUSHER_UID:       ${{ secrets.WXPUSHER_UID }}
        run: |
          python renew.py 2>&1 | tee renew.log

      - name: 上传截图（调试用）
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aclclouds-screenshots
          path: screenshots/
          retention-days: 3

      - name: 删除当前 workflow 的旧 runs（保留最近2个）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          WORKFLOW_ID=$(gh api repos/${{ github.repository }}/actions/workflows \
            --jq '.workflows[] | select(.name == "${{ github.workflow }}") | .id')
          echo "Workflow ID: $WORKFLOW_ID"
          gh api "repos/${{ github.repository }}/actions/workflows/${WORKFLOW_ID}/runs" \
            --paginate \
            --jq '.workflow_runs[2:][] | .id' \
            | while read id; do
                echo "Deleting run $id"
                gh api -X DELETE "repos/${{ github.repository }}/actions/runs/$id"
              done
